name: Reusable Deploy
on:
  workflow_call:
      inputs:
        artifact-name:
          description: The name iof deployable artifact
          required: false
          default: dist
          type: string
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/download-artifact@v6
        with:
          path: ${{inputs.artifact-name}}
      - name: List files
        run: ls
      - name: Output information
        run: echo "Deploying & uploading..."